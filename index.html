<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>智能救援机器人避障仿真</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            cyan: '#36CFC9',
            light: '#F7F8FA',
            border: '#E5E6EB'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); }
      .slider::-webkit-slider-thumb { appearance: none; width:16px; height:16px; background:#165DFF; border-radius:50%; }
    }
  </style>
</head>
<body class="bg-light min-h-screen">
<div class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">

  <div class="glass rounded-2xl p-5 flex flex-col md:flex-row items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <i class="fa fa-robot text-primary text-2xl"></i>
      <h1 class="text-xl md:text-2xl font-bold">智能救援机器人避障仿真</h1>
    </div>
    <div class="flex gap-2 mt-3 md:mt-0">
      <span class="px-3 py-1 rounded-lg bg-primary/10 text-xs text-primary">避障导航</span>
      <span class="px-3 py-1 rounded-lg bg-cyan/10 text-xs text-cyan">往返任务</span>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <div class="lg:col-span-3 glass rounded-2xl p-5 shadow-sm">
      <h2 class="text-lg font-bold mb-4">仿真参数</h2>
      <div class="space-y-4">
        <div>
          <label class="text-sm block mb-1">障碍物数量</label>
          <input type="range" min="3" max="25" value="10" id="obstacleCount" class="w-full slider">
          <div class="flex justify-between text-xs text-gray-500 mt-1">
            <span>少</span><span id="obstacleVal">10</span><span>多</span>
          </div>
        </div>
        <div>
          <label class="text-sm block mb-1">移动速度</label>
          <input type="range" min="30" max="100" value="60" id="robotSpeed" class="w-full slider">
          <div class="flex justify-between text-xs text-gray-500 mt-1">
            <span>慢</span><span id="speedVal">60</span><span>快</span>
          </div>
        </div>
      </div>
      <div class="mt-6 space-y-2">
        <button id="start" class="w-full py-2.5 bg-primary text-white rounded-xl font-medium hover:shadow-lg transition">
          <i class="fa fa-play mr-1"></i>启动任务
        </button>
        <button id="reset" class="w-full py-2.5 bg-white border border-border rounded-xl hover:bg-gray-50 transition">
          <i class="fa fa-refresh mr-1"></i>重置
        </button>
      </div>
    </div>

    <div class="lg:col-span-6 glass rounded-2xl relative overflow-hidden">
      <canvas id="sim" class="w-full h-full"></canvas>
    </div>

    <div class="lg:col-span-3 glass rounded-2xl p-5 shadow-sm">
      <h2 class="text-lg font-bold mb-4">任务状态</h2>
      <div class="grid grid-cols-2 gap-3">
        <div class="p-3 bg-white rounded-xl border border-border text-center">
          <p class="text-xs text-gray-500">目标距离</p>
          <p id="dist" class="text-xl font-bold">--</p>
        </div>
        <div class="p-3 bg-white rounded-xl border border-border text-center">
          <p class="text-xs text-gray-500">任务进度</p>
          <p id="progress" class="text-xl font-bold text-primary">0%</p>
        </div>
        <div class="p-3 bg-white rounded-xl border border-border text-center">
          <p class="text-xs text-gray-500">避障次数</p>
          <p id="avoidCount" class="text-xl font-bold">0</p>
        </div>
        <div class="p-3 bg-white rounded-xl border border-border text-center">
          <p class="text-xs text-gray-500">运行状态</p>
          <p id="state" class="text-xl font-bold text-cyan">待机</p>
        </div>
      </div>
      <div class="mt-5">
        <h3 class="text-sm font-bold mb-2">任务日志</h3>
        <div id="log" class="h-36 bg-white rounded-xl border border-border p-2 text-xs overflow-y-auto"></div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  reset();
}
window.addEventListener('resize', resize);

let obstacleCount = 10;
let robotSpeed = 60;
let isRunning = false;

let startPoint = { x: 60, y: canvas.height - 60 };
let targetPoint = { x: canvas.width - 80, y: 80 };
let robot = { x: startPoint.x, y: startPoint.y, r: 12 };
let obstacles = [];
let avoidCount = 0;
let missionMode = 'go';
let lastAvoid = {};

const $ = id => document.getElementById(id);

function log(text) {
  $('log').innerHTML += `<p class="text-primary">${text}</p>`;
  $('log').scrollTop = $('log').scrollHeight;
}

function createObstacles() {
  obstacles = [];
  const margin = 80;
  for (let i = 0; i < obstacleCount; i++) {
    let x, y, r = 10 + Math.random() * 8;
    for (let t = 0; t < 100; t++) {
      x = margin + Math.random() * (canvas.width - 2 * margin);
      y = margin + Math.random() * (canvas.height - 2 * margin);
      const dStart = Math.hypot(x - startPoint.x, y - startPoint.y);
      const dTarget = Math.hypot(x - targetPoint.x, y - targetPoint.y);
      if (dStart > 60 && dTarget > 60) {
        obstacles.push({ x, y, r });
        break;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#f0f0f0';
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  ctx.fillStyle = '#36CFC9';
  ctx.beginPath();
  ctx.arc(targetPoint.x, targetPoint.y, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.arc(startPoint.x, startPoint.y, 8, 0, Math.PI * 2);
  ctx.fill();

  obstacles.forEach(o => {
    ctx.fillStyle = '#dbe1e8';
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.fillStyle = '#165DFF';
  ctx.beginPath();
  ctx.arc(robot.x, robot.y, robot.r, 0, Math.PI * 2);
  ctx.fill();

  if (isRunning) {
    ctx.strokeStyle = 'rgba(22,93,255,0.12)';
    ctx.beginPath();
    ctx.arc(robot.x, robot.y, 60, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function updateRobot() {
  const speed = robotSpeed / 80;
  const senseDist = 60;
  const safeDist = 28;

  let goalX, goalY;
  if (missionMode === 'go') {
    goalX = targetPoint.x;
    goalY = targetPoint.y;
  } else {
    goalX = startPoint.x;
    goalY = startPoint.y;
  }

  let dx = goalX - robot.x;
  let dy = goalY - robot.y;
  let distToGoal = Math.hypot(dx, dy);

  let dirX = dx / distToGoal || 0;
  let dirY = dy / distToGoal || 0;

  obstacles.forEach(o => {
    const dxo = robot.x - o.x;
    const dyo = robot.y - o.y;
    const d = Math.hypot(dxo, dyo);
    if (d < senseDist && d > 1) {
      const f = 0.7 * (senseDist - d) / senseDist;
      dirX += (dxo / d) * f;
      dirY += (dyo / d) * f;

      const key = o.x.toFixed(1) + "," + o.y.toFixed(1);
      if (d < robot.r + o.r + safeDist && !lastAvoid[key]) {
        avoidCount++;
        lastAvoid[key] = true;
      }
    }
  });

  const len = Math.hypot(dirX, dirY);
  if (len > 0.001) {
    dirX /= len;
    dirY /= len;
  }

  robot.x += dirX * speed;
  robot.y += dirY * speed;

  let fullDist = Math.hypot(targetPoint.x - startPoint.x, targetPoint.y - startPoint.y);
  let prog;
  if (missionMode === 'go') {
    prog = Math.min(100, Math.round((1 - distToGoal / fullDist) * 100));
  } else {
    prog = Math.min(100, Math.round((1 - distToGoal / fullDist) * 100));
  }

  $('dist').textContent = Math.round(distToGoal);
  $('progress').textContent = prog + '%';
  $('avoidCount').textContent = avoidCount;

  if (missionMode === 'go' && distToGoal < 18) {
    missionMode = 'return';
    log('已到达目标点，开始返回');
    $('state').textContent = '返回起点';
  }
  if (missionMode === 'return' && distToGoal < 18) {
    isRunning = false;
    log('已返回起点，任务完成');
    $('state').textContent = '已完成';
    $('start').disabled = false;
    $('start').innerHTML = '<i class="fa fa-play mr-1"></i>启动任务';
  }
}

function loop() {
  if (!isRunning) return;
  updateRobot();
  draw();
  requestAnimationFrame(loop);
}

function start() {
  if (isRunning) return;
  isRunning = true;
  missionMode = 'go';
  $('state').textContent = '前往目标';
  $('start').disabled = true;
  $('start').innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>执行中';
  log('任务开始');
  loop();
}

function reset() {
  isRunning = false;
  robot.x = startPoint.x;
  robot.y = startPoint.y;
  avoidCount = 0;
  lastAvoid = {};
  missionMode = 'go';
  $('dist').textContent = '--';
  $('progress').textContent = '0%';
  $('avoidCount').textContent = '0';
  $('state').textContent = '待机';
  $('log').innerHTML = '';
  $('start').disabled = false;
  $('start').innerHTML = '<i class="fa fa-play mr-1"></i>启动任务';
  createObstacles();
  draw();
}

$('obstacleCount').addEventListener('input', () => {
  obstacleCount = +$('obstacleCount').value;
  $('obstacleVal').textContent = obstacleCount;
});

$('robotSpeed').addEventListener('input', () => {
  robotSpeed = +$('robotSpeed').value;
  $('speedVal').textContent = robotSpeed;
});

$('start').addEventListener('click', start);
$('reset').addEventListener('click', reset);

reset();
</script>
</body>
</html>
