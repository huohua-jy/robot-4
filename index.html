<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能复合材料救援机器人仿真系统</title>
    <!-- 引入样式库：快速实现科技感UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tech: {
                            dark: '#0f172a',
                            blue: '#165DFF',
                            cyan: '#00e5ff',
                            gray: '#1e293b',
                            light: '#f1f5f9'
                        }
                    },
                    fontFamily: {
                        mono: ['Consolas', 'monospace']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                background: rgba(15, 23, 42, 0.7);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(22, 93, 255, 0.3);
            }
            .glow {
                box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
            }
            .animate-pulse-slow {
                animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
        }
    </style>
</head>
<body class="bg-tech-dark text-tech-light font-mono min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="glass px-6 py-4 flex items-center justify-between border-b border-tech-blue/50">
        <div class="flex items-center gap-3">
            <i class="fa fa-robot text-tech-cyan text-2xl"></i>
            <h1 class="text-xl md:text-2xl font-bold text-tech-cyan">智能复合材料救援机器人仿真系统</h1>
        </div>
        <div class="hidden md:flex items-center gap-6 text-sm">
            <span><i class="fa fa-check-circle text-green-400 mr-1"></i>实时仿真</span>
            <span><i class="fa fa-cogs text-tech-blue mr-1"></i>参数可调</span>
            <span><i class="fa fa-microchip text-tech-cyan mr-1"></i>材料特性</span>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 p-4 md:p-6 flex flex-col lg:flex-row gap-6">
        <!-- 左侧：控制面板 -->
        <div class="glass w-full lg:w-80 rounded-xl p-5 flex flex-col gap-6">
            <h2 class="text-lg font-bold text-tech-blue flex items-center gap-2">
                <i class="fa fa-sliders"></i>仿真参数控制
            </h2>

            <!-- 地形复杂度调节 -->
            <div class="space-y-2">
                <label class="block text-sm flex justify-between">
                    <span>地形复杂度</span>
                    <span id="terrain-value" class="text-tech-cyan">50%</span>
                </label>
                <input type="range" min="10" max="100" value="50" 
                    class="w-full h-2 bg-tech-gray rounded-lg appearance-none cursor-pointer"
                    id="terrain-slider">
            </div>

            <!-- 障碍密度调节 -->
            <div class="space-y-2">
                <label class="block text-sm flex justify-between">
                    <span>障碍物密度</span>
                    <span id="obstacle-value" class="text-tech-cyan">30%</span>
                </label>
                <input type="range" min="5" max="60" value="30" 
                    class="w-full h-2 bg-tech-gray rounded-lg appearance-none cursor-pointer"
                    id="obstacle-slider">
            </div>

            <h2 class="text-lg font-bold text-tech-blue flex items-center gap-2 mt-2">
                <i class="fa fa-microchip"></i>复合材料特性
            </h2>

            <!-- 碳纤维轻量化 -->
            <div class="p-3 bg-tech-gray/50 rounded-lg border border-tech-blue/30">
                <h3 class="text-sm font-bold">碳纤维机身</h3>
                <p class="text-xs text-gray-300">轻量化强度提升：<span id="lightweight-value" class="text-tech-cyan font-bold">45%</span></p>
                <div class="h-2 w-full bg-tech-gray rounded-full mt-2">
                    <div id="lightweight-bar" class="h-full bg-tech-blue rounded-full" style="width: 45%"></div>
                </div>
            </div>

            <!-- 自修复材料 -->
            <div class="p-3 bg-tech-gray/50 rounded-lg border border-tech-cyan/30">
                <h3 class="text-sm font-bold">自修复材料</h3>
                <p id="repair-status" class="text-xs text-gray-300">状态：待机</p>
                <button id="repair-btn" class="mt-2 w-full py-1.5 bg-tech-cyan/20 hover:bg-tech-cyan/40 rounded text-xs border border-tech-cyan/50 transition">
                    <i class="fa fa-refresh mr-1"></i>触发自修复演示
                </button>
            </div>

            <!-- 控制按钮 -->
            <button id="start-btn" class="mt-2 py-3 bg-tech-blue hover:bg-tech-blue/80 rounded-lg font-bold transition glow">
                <i class="fa fa-play mr-1"></i>启动仿真
            </button>
            <button id="reset-btn" class="py-2 bg-tech-gray hover:bg-tech-gray/80 rounded-lg text-sm transition">
                <i class="fa fa-refresh mr-1"></i>重置环境
            </button>
        </div>

        <!-- 中间：仿真画布 -->
        <div class="flex-1 glass rounded-xl overflow-hidden relative">
            <canvas id="simulation-canvas" class="w-full h-full bg-tech-dark"></canvas>
            <!-- 仿真提示 -->
            <div id="sim-tip" class="absolute top-4 left-4 glass px-3 py-1.5 rounded text-xs">
                <i class="fa fa-info-circle text-tech-cyan mr-1"></i>调整左侧参数，点击启动仿真
            </div>
        </div>

        <!-- 右侧：数据面板 -->
        <div class="glass w-full lg:w-72 rounded-xl p-5 flex flex-col gap-5">
            <h2 class="text-lg font-bold text-tech-blue flex items-center gap-2">
                <i class="fa fa-bar-chart"></i>实时性能数据
            </h2>

            <div class="grid grid-cols-2 gap-3">
                <div class="p-3 bg-tech-gray/50 rounded-lg text-center">
                    <p class="text-xs text-gray-400">路径规划效率</p>
                    <p id="path-eff" class="text-xl font-bold text-tech-cyan">0%</p>
                </div>
                <div class="p-3 bg-tech-gray/50 rounded-lg text-center">
                    <p class="text-xs text-gray-400">障碍物识别率</p>
                    <p id="obstacle-rate" class="text-xl font-bold text-tech-blue">0%</p>
                </div>
                <div class="p-3 bg-tech-gray/50 rounded-lg text-center">
                    <p class="text-xs text-gray-400">机身重量(kg)</p>
                    <p id="weight" class="text-xl font-bold text-white">12.8</p>
                </div>
                <div class="p-3 bg-tech-gray/50 rounded-lg text-center">
                    <p class="text-xs text-gray-400">修复完成度</p>
                    <p id="repair-rate" class="text-xl font-bold text-green-400">0%</p>
                </div>
            </div>

            <div class="space-y-3 mt-2">
                <h3 class="text-sm font-bold text-tech-blue">仿真状态</h3>
                <div id="status-log" class="h-40 p-3 bg-tech-dark rounded border border-tech-gray/50 text-xs overflow-y-auto">
                    <p class="text-gray-400">[系统] 等待启动指令...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="glass py-3 text-center text-xs text-gray-400 border-t border-tech-blue/30">
        智能复合材料救援机器人仿真系统 © 2026 预览版
    </footer>

    <!-- 核心仿真逻辑 -->
    <script>
        // 获取DOM元素
        const canvas = document.getElementById('simulation-canvas');
        const ctx = canvas.getContext('2d');
        const terrainSlider = document.getElementById('terrain-slider');
        const obstacleSlider = document.getElementById('obstacle-slider');
        const terrainValue = document.getElementById('terrain-value');
        const obstacleValue = document.getElementById('obstacle-value');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const repairBtn = document.getElementById('repair-btn');
        const statusLog = document.getElementById('status-log');
        const pathEff = document.getElementById('path-eff');
        const obstacleRate = document.getElementById('obstacle-rate');
        const repairStatus = document.getElementById('repair-status');
        const repairRate = document.getElementById('repair-rate');
        const lightweightBar = document.getElementById('lightweight-bar');
        const lightweightValue = document.getElementById('lightweight-value');
        const weightValue = document.getElementById('weight');
        const simTip = document.getElementById('sim-tip');

        // 画布尺寸适配
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 全局参数
        let simulationRunning = false;
        let terrainComplexity = 50;
        let obstacleDensity = 30;
        let obstacles = [];
        let robot = { x: 50, y: canvas.height - 50, size: 30, color: '#165DFF' };
        let target = { x: canvas.width - 80, y: 80 };
        let repairProgress = 0;
        let repairAnim = null;

        // 初始化障碍物
        function generateObstacles() {
            obstacles = [];
            const count = Math.floor(obstacleDensity / 2);
            for (let i = 0; i < count; i++) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: Math.random() * (canvas.height - 150) + 70,
                    w: Math.random() * 40 + 20,
                    h: Math.random() * 40 + 20,
                    detected: false
                });
            }
        }

        // 绘制场景
        function drawScene() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制废墟背景
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地形网格
            ctx.strokeStyle = 'rgba(22, 93, 255, 0.2)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 绘制终点
            ctx.fillStyle = '#00e5ff';
            ctx.beginPath();
            ctx.arc(target.x, target.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            // 绘制障碍物
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.detected ? 'rgba(255, 60, 60, 0.8)' : 'rgba(100, 116, 139, 0.6)';
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.strokeStyle = obs.detected ? '#ff0000' : '#334155';
                ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                if (obs.detected) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px monospace';
                    ctx.fillText('识别', obs.x + 5, obs.y + 15);
                }
            });

            // 绘制机器人
            ctx.fillStyle = robot.color;
            ctx.fillRect(robot.x - robot.size/2, robot.y - robot.size/2, robot.size, robot.size);
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(robot.x - robot.size/2, robot.y - robot.size/2, robot.size, robot.size);
            
            // 机器人雷达效果
            if (simulationRunning) {
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(robot.x, robot.y, 50, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // 障碍物识别
        function detectObstacles() {
            obstacles.forEach(obs => {
                const dist = Math.hypot(robot.x - obs.x, robot.y - obs.y);
                if (dist < 80) obs.detected = true;
            });
            const detectedCount = obstacles.filter(o => o.detected).length;
            const rate = obstacles.length > 0 ? Math.floor((detectedCount / obstacles.length) * 100) : 100;
            obstacleRate.textContent = rate + '%';
            return rate;
        }

        // 路径规划移动
        function robotMove() {
            if (robot.x < target.x) robot.x += 1.5;
            if (robot.y > target.y) robot.y -= 1.5;
            
            // 避障逻辑
            obstacles.forEach(obs => {
                if (
                    robot.x > obs.x - 20 &&
                    robot.x < obs.x + obs.w + 20 &&
                    robot.y > obs.y - 20 &&
                    robot.y < obs.y + obs.h + 20
                ) {
                    robot.x += 3;
                    robot.y -= 2;
                }
            });

            // 计算路径效率
            const totalDist = Math.hypot(target.x - 50, target.y - (canvas.height - 50));
            const currentDist = Math.hypot(target.x - robot.x, target.y - robot.y);
            const eff = Math.floor(100 - (currentDist / totalDist) * 100);
            pathEff.textContent = eff + '%';

            if (currentDist < 20) {
                stopSimulation(true);
            }
        }

        // 自修复动画
        function startRepair() {
            clearInterval(repairAnim);
            repairProgress = 0;
            repairStatus.textContent = '状态：修复中...';
            repairStatus.classList.add('text-tech-cyan', 'animate-pulse-slow');
            
            repairAnim = setInterval(() => {
                repairProgress += 1;
                repairRate.textContent = repairProgress + '%';
                if (repairProgress >= 100) {
                    clearInterval(repairAnim);
                    repairStatus.textContent = '状态：修复完成 ✅';
                    repairStatus.classList.remove('animate-pulse-slow');
                    addLog('自修复材料：机身损伤已完全修复');
                }
            }, 50);
        }

        // 日志输出
        function addLog(text) {
            statusLog.innerHTML += `<p class="text-tech-cyan">${text}</p>`;
            statusLog.scrollTop = statusLog.scrollHeight;
        }

        // 启动仿真
        function startSimulation() {
            if (simulationRunning) return;
            simulationRunning = true;
            simTip.style.display = 'none';
            startBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>仿真运行中';
            startBtn.disabled = true;
            
            // 初始化
            generateObstacles();
            robot.x = 50;
            robot.y = canvas.height - 50;
            repairProgress = 0;
            repairRate.textContent = '0%';
            
            addLog(`[启动] 地形复杂度：${terrainComplexity}% | 障碍密度：${obstacleDensity}%`);
            addLog('[机器人] 开始路径规划与障碍物识别');
            addLog('[材料] 碳纤维机身：轻量化45%，强度提升60%');

            // 运行循环
            function loop() {
                if (!simulationRunning) return;
                drawScene();
                detectObstacles();
                robotMove();
                requestAnimationFrame(loop);
            }
            loop();
        }

        // 停止仿真
        function stopSimulation(success) {
            simulationRunning = false;
            startBtn.innerHTML = '<i class="fa fa-play mr-1"></i>启动仿真';
            startBtn.disabled = false;
            if (success) addLog('[完成] 机器人已到达目标点！');
        }

        // 重置仿真
        function resetSimulation() {
            stopSimulation(false);
            terrainSlider.value = 50;
            obstacleSlider.value = 30;
            terrainComplexity = 50;
            obstacleDensity = 30;
            terrainValue.textContent = '50%';
            obstacleValue.textContent = '30%';
            pathEff.textContent = '0%';
            obstacleRate.textContent = '0%';
            repairRate.textContent = '0%';
            repairStatus.textContent = '状态：待机';
            statusLog.innerHTML = '<p class="text-gray-400">[系统] 等待启动指令...</p>';
            drawScene();
            simTip.style.display = 'block';
        }

        // 滑块事件
        terrainSlider.addEventListener('input', () => {
            terrainComplexity = terrainSlider.value;
            terrainValue.textContent = terrainComplexity + '%';
            // 同步更新轻量化参数
            const light = Math.floor(terrainComplexity * 0.9);
            lightweightBar.style.width = light + '%';
            lightweightValue.textContent = light + '%';
            weightValue.textContent = (15 - (light / 10)).toFixed(1);
        });

        obstacleSlider.addEventListener('input', () => {
            obstacleDensity = obstacleSlider.value;
            obstacleValue.textContent = obstacleDensity + '%';
        });

        // 按钮事件
        startBtn.addEventListener('click', startSimulation);
        resetBtn.addEventListener('click', resetSimulation);
        repairBtn.addEventListener('click', () => {
            startRepair();
            addLog('[材料] 触发自修复材料特性演示');
        });

        // 初始绘制
        drawScene();
    </script>
</body>
</html>
